server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: agent-chat-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: agent-chat-backend
          app: agent-chat
          env: development
          __path__: /Users/baodo/Documents/Code/LlamaIndex_Code/AgentChatApplication/agent_chat_backend/logs/app.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
            logger: logger
            request_id: request_id
            user_id: user_id
            timestamp: timestamp

      - labels:
          level:
          event:
          logger:

      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.999999Z"
